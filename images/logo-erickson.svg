<svg width="220" height="78" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #101518; }
    .primary { fill: #22c55e; }
    .text { fill: #e2e8f0; font-family: Arial, Helvetica, sans-serif; font-weight: 600; }
    .sub { fill: #94a3b8; font-family: Arial, Helvetica, sans-serif; font-size: 10px; }
  </style>

  <!-- Background rounded -->
  <rect class="bg" x="0" y="0" rx="12" ry="12" width="220" height="60"/>

  <!-- Code symbol -->
  <text x="18" y="37" font-size="28" class="primary">&lt;/&gt;</text>

  <!-- Name / Brand -->
  <text x="80" y="32" font-size="18" class="text">Erickson.dev</text>

  <!-- Subtitle -->
  <text x="80" y="45" class="sub">Front-end • JavaScript</text>
</svg>